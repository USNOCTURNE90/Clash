name: Sync Clash to Surge

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: sync-clash-to-surge
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[AUTO_SYNC]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Configure git remote
        env:
          GH_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git pull --rebase origin main

      - name: Run sync engine
        env:
          GH_PAT: ${{ secrets.SYNC_PAT }}
          PEER_REPO: USNOCTURNE90/Surge
          PEER_BRANCH: Surge
          CURRENT_REPO_TYPE: clash
        run: python tools/sync_engine_main.py

      - name: Push local state updates
        run: |
          git config user.name autosync-bot
          git config user.email autosync-bot@users.noreply.github.com
          git add .sync_state.json
          git diff --cached --quiet || git commit -m "[AUTO_SYNC] Update sync state"
          git push origin HEAD:main
