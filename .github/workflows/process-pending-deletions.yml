name: Process Pending Deletions

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  process:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[AUTO_SYNC]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Process pending deletions
        env:
          TARGET_REPO: USNOCTURNE90/Surge
          TARGET_BRANCH: Surge
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python .github/scripts/process_pending_deletions.py
