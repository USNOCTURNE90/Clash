name: Process Pending Deletions

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Process pending deletions
        env:
          TARGET_REPO: USNOCTURNE90/Surge
          TARGET_BRANCH: Surge
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: python .github/scripts/process_pending_deletions.py