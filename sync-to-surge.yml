# 从Surge自动同步
# 原始文件: sync-to-surge.yml
rules:
  - name: Sync Clash to Surge
  - on:
  - push:
  - branches:
  - main
  - workflow_dispatch:
  - jobs:
  - sync:
  - DOMAIN-SUFFIX,if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[AUTO_SYNC]') }}
  - runs-on: ubuntu-latest
  - steps:
  - name: Checkout Clash repo
  - uses: actions/checkout@v4
  - with:
  - fetch-depth: 0
  - name: Set up Python
  - uses: actions/setup-python@v5
  - with:
  - DOMAIN-SUFFIX,python-version: '3.11'
  - name: Run Clash to Surge sync
  - env:
  - TARGET_REPO: USNOCTURNE90/Surge
  - TARGET_BRANCH: Surge
  - DOMAIN-SUFFIX,GITHUB_TOKEN: ${{ secrets.PAT }}
  - run: |
  - DOMAIN-SUFFIX,python .github/scripts/sync_to_surge.py
